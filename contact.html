      </nav>
    </header>
    <main>
      <section class="section contact">
        <div>
          <p class="eyebrow">Contact</p>
          <h1>聯絡玩美學</h1>
          <p>無論你是想了解課程與講堂、邀約合作、申請成為教育夥伴，或想進一步討論教育內容規劃，都歡迎與我們聯繫。</p>
          <div class="contact-list">
            <a href="mailto:playsomemoremore@gmail.com">playsomemoremore@gmail.com</a>
            <span>LINE：@550ovurs</span>
            <a href="https://www.facebook.com/profile.php?id=100057521497201">Facebook 專頁</a>
          </div>
        </div>
        <form class="contact-form" data-contact-form>
          <label>姓名<input type="text" name="name" autocomplete="name" required></label>
          <label>聯絡信箱<input type="email" name="email" autocomplete="email" required></label>
          <label>需求類型
            <select name="topic" required>
              <option value="">請選擇</option>
              <option>課程 / 講堂詢問</option>
              <option>家長工作坊</option>
              <option>教育夥伴合作</option>
              <option>講座 / 活動邀約</option>
              <option>師資培訓</option>
              <option>其他詢問</option>
            </select>
          </label>
          <label>想說的事<textarea name="message" rows="5" required></textarea></label>
          <button class="button primary" type="submit">送出需求</button>
          <p class="form-note" data-form-note aria-live="polite"></p>
        </form>
      </section>
    </main>
    <footer class="site-footer"><p>玩美學 Being perfect</p><p>教育共生平台 / 師資賦能 / 課程整合</p></footer>
